name: Deploy ClickUp Clone to Production

on:
  push:
    branches:
      - clickup

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Deps
        run: cd Click-up_Nayan-claude-setup-project-structure-vQdcS/backend && npm ci

      - name: Run Backend Tests
        run: cd Click-up_Nayan-claude-setup-project-structure-vQdcS/backend && npm test

      - name: Install Frontend Deps
        run: cd Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend && npm ci

      - name: Run Frontend Tests
        run: cd Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend && npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/clickup-clone
            git pull origin clickup
            cd Click-up_Nayan-claude-setup-project-structure-vQdcS && docker compose down
            docker compose up -d --build
            docker system prune -f