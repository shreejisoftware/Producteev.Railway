name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - clickup
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend
        run: npm run build

      - name: Copy 404.html for SPA routing
        run: cp Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend/dist/index.html Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Click-up_Nayan-claude-setup-project-structure-vQdcS/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
